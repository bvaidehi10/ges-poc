steps:
  # Step 1: Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build Image'
    args: [
      'build', 
      '-t', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO_NAME}/${_IMAGE_NAME}:${COMMIT_SHA}', 
      '.'
    ]

  # Step 2: AI Error Analysis / Evaluation Gate
  # We run a temporary container using the image we just built
  # to execute our Python evaluation script.
  - name: 'gcr.io/cloud-builders/docker'
    id: 'AI Evaluation Gate'
    args: [
      'run',
      '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO_NAME}/${_IMAGE_NAME}:${COMMIT_SHA}',
      'python', 'eval_ai.py'
    ]

  # Step 3: Push the image (Only if Step 2 passes)
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push to Registry'
    args: [
      'push', 
      '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO_NAME}/${_IMAGE_NAME}:${COMMIT_SHA}'
    ]

  # Step 4: Deploy to Cloud Run (Only if Step 2 passes)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Deploy to Cloud Run'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO_NAME}/${_IMAGE_NAME}:${COMMIT_SHA}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--port'
      - '8501'
      - '--allow-unauthenticated'

substitutions:
  _REGION: us-central1
  _AR_REPO_NAME: ges-poc
  _IMAGE_NAME: ges-poc
  _SERVICE_NAME: ges-poc-service

options:
  logging: CLOUD_LOGGING_ONLY