steps:
  # Step 1: Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build Image'
    args: [
      'build', 
      '-t', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO_NAME}/${_IMAGE_NAME}:${COMMIT_SHA}', 
      '.'
    ]

  # Step 2: Push the image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push to Registry'
    args: [
      'push', 
      '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO_NAME}/${_IMAGE_NAME}:${COMMIT_SHA}'
    ]

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Deploy to Cloud Run'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO_NAME}/${_IMAGE_NAME}:${COMMIT_SHA}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--port'
      - '8501'
      - '--allow-unauthenticated'

  # Step 4: THE AI ERROR ANALYST (The Failure Trap)
  - name: 'python:3.11-slim'
    id: 'analyze-failure'
    # waitFor: ['-'] makes this step start immediately/parallelly 
    # so it survives even if Step 1, 2, or 3 fails.
    waitFor: ['-'] 
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        pip install google-genai google-cloud-build
        python analyze_failure.py
    env:
      - 'PROJECT_ID=${PROJECT_ID}'
      - 'BUILD_ID=${BUILD_ID}'

substitutions:
  _REGION: us-central1
  _AR_REPO_NAME: ges-poc
  _IMAGE_NAME: ges-poc
  _SERVICE_NAME: ges-poc-service

options:
  logging: CLOUD_LOGGING_ONLY