steps:
  # Step 1: Build Image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build Image'
    args:
      [
        'build',
        '-t',
        '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO_NAME}/${_IMAGE_NAME}:${COMMIT_SHA}',
        '.'
      ]

  # Step 2: Push
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push to Registry'
    args:
      [
        'push',
        '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO_NAME}/${_IMAGE_NAME}:${COMMIT_SHA}'
      ]

  # Step 3: Deploy
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Deploy to Cloud Run'
    entrypoint: gcloud
    args:
      [
        'run',
        'deploy',
        '${_SERVICE_NAME}',
        '--image',
        '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO_NAME}/${_IMAGE_NAME}:${COMMIT_SHA}',
        '--region',
        '${_REGION}',
        '--platform',
        'managed',
        '--port',
        '8501',
        '--allow-unauthenticated'
      ]

  # Step 4: AI ERROR ANALYST
  - name: 'python:3.11-slim'
    id: 'analyze-failure'
    waitFor: ['-'] 
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        echo "📥 Installing AI Analysis dependencies..."
        pip install --quiet --no-cache-dir google-genai google-cloud-build
        echo "🚀 Running AI Failure Analysis..."
        python analyze_failure.py
    env:
      - 'PROJECT_ID=${PROJECT_ID}'
      - 'BUILD_ID=${BUILD_ID}'
    allowFailure: true

substitutions:
  _REGION: us-central1
  _AR_REPO_NAME: ges-poc
  _IMAGE_NAME: ges-poc
  _SERVICE_NAME: ges-poc-service

options:
  logging: CLOUD_LOGGING_ONLY