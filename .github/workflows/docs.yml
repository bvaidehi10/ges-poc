name: AI Documentation Engine
on:
  push:
    branches: [ feature/ai-docs ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install mkdocs-material pymdown-extensions google-genai

      - name: Generate AI Docs
        run: |
          mkdir -p docs
          python scripts/generate_elaborate_docs.py
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Build MkDocs Site
        run: mkdocs build

      # CRITICAL FIX: Prevent GitHub from using Jekyll
      - name: Disable Jekyll
        run: touch site/.nojekyll

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4